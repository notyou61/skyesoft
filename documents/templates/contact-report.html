<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{documentTitle}}</title>
  <style>
    @page { size: letter portrait; margin: 0.75in 0.5in 0.75in 0.5in; }
    body { font-family: Arial, sans-serif; font-size: 11pt; color: #333; margin:0; padding:0; }
    header { position: fixed; top: 0; left: 0; right: 0; height: 0.85in; background: #0a2540; color: white; padding: 0 0.5in; display: flex; align-items: center; }
    header .logo { height: 65px; margin-right: 15px; }
    header .text { line-height: 1.1; }
    header .title { font-size: 16pt; font-weight: bold; }
    header .subtitle { font-size: 11pt; opacity: 0.9; }
    header::after { content:''; position:absolute; bottom:0; left:0.5in; right:0.5in; height:2px; background:#fff; }

    footer { position: fixed; bottom: 0; left: 0; right: 0; height: 0.55in; font-size: 9pt; color: #555; padding: 0 0.5in; display: flex; align-items: center; justify-content: space-between; }
    footer::before { content:''; position:absolute; top:0; left:0.5in; right:0.5in; height:1px; background:#ccc; }

    main { margin-top: 1.05in; margin-bottom: 0.75in; }
    .section { margin-bottom: 22px; page-break-inside: avoid; }
    table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    th, td { border: 1px solid #ccc; padding: 8px; vertical-align: top; }
    th { background: #f5f5f5; width: 32%; }
    .map-container { text-align: center; margin: 15px 0; padding: 10px; border: 1px solid #ddd; }
    .map-container img { max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <header>
    <img src="{{logoUrl}}" class="logo" alt="Christy Signs">
    <div class="text">
      <div class="title">Skyesoft Operational Intelligence</div>
      <div class="subtitle">Proposed Contact Report</div>
    </div>
  </header>

  <footer>
    <div>Metro Monument Group • Confidential</div>
    <div>Generated: {{generatedDate}} &nbsp; • &nbsp; Page <span class="pageNumber"></span> of <span class="totalPages"></span></div>
  </footer>

  <main>
    {{documentBody}}
  </main>
</body>
</html>
