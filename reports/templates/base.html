<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{documentTitle}}</title>
  <style>
    @page { margin: 0.75in 0.5in 0.75in 0.5in; }
    body { font-family: Arial, sans-serif; font-size: 11pt; color: #333; margin:0; padding:0; }
    
    header { position: fixed; top:0; left:0; right:0; height:0.9in; background:#0a2540; color:white; padding:0 0.5in; display:flex; align-items:center; }
    header img { height:65px; margin-right:15px; }
    header .title { font-size:16pt; font-weight:bold; }
    header .subtitle { font-size:11pt; opacity:0.95; }
    
    footer { position:fixed; bottom:0; left:0; right:0; height:0.6in; font-size:9pt; color:#555; padding:0 0.5in; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #ccc; }
    
    main { margin-top:1.1in; margin-bottom:0.8in; }
    .section { margin-bottom:22px; page-break-inside:avoid; }
    table { width:100%; border-collapse:collapse; margin:10px 0; }
    th, td { border:1px solid #ccc; padding:8px; vertical-align:top; }
    th { background:#f5f5f5; width:32%; }
    .map-container { text-align:center; margin:15px 0; padding:10px; border:1px solid #ddd; }
  </style>
</head>
<body>
  <header>
    <img src="https://skyelighting.com/assets/images/christyLogo.jpg" alt="Christy Signs">
    <div>
      <div class="title">Skyesoft Operational Intelligence</div>
      <div class="subtitle">{{documentTitle}}</div>
    </div>
  </header>

  <footer>
    <div>{{entityName}} • Confidential</div>
    <div>Generated: {{generatedDate}} • Page <span class="pageNumber"></span> of <span class="totalPages"></span></div>
  </footer>

  <main>
    {{documentBody}}
  </main>
</body>
</html>
