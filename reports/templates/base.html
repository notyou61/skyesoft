<!--
  🧠 Skyesoft — base.html
  📄 Universal Operational PDF Constitution (mPDF Edition)
  🧩 Reusable Report Shell (Header → Body → Footer)
  📍 Christy Signs | Phoenix, Arizona
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{reportTitle}}</title>

    <style>
        /* #region 📄 PAGE CONSTITUTION */

        @page {
            size: letter portrait;
            margin: 0.4in 0.4in 0.5in 0.4in;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 11pt;
            color: #222;
            line-height: 1.4;
        }

        body, table, th, td, div, span, p, h1, h2, h3, h4, h5, h6 {
            font-family: Helvetica, Arial, sans-serif;
        }

        /* #endregion */

        /* #region 🏢 HEADER */

        header {
            border-bottom: 2.5px solid #14377C;
            padding-bottom: 8px;
            margin-bottom: 14px;
        }

        .headerTable {
            width: 100%;
            border-collapse: collapse;
            border: none;
        }

        .headerTable td {
            border: none;
            vertical-align: middle;
            padding: 0;
        }

        .headerLogoCell {
            width: auto !important;
            white-space: nowrap;
            text-align: left;
            vertical-align: middle;
            padding-right: 2px !important;
            padding-left: 0 !important;
            max-width: 44px;
        }

        .headerTitleCell {
            width: auto;
            text-align: left;
            vertical-align: middle;
            padding-left: 0 !important;
        }

        .headerLogo {
            height: 46px;
            display: block;
        }

        .headerTitle {
            font-size: 15pt;
            font-weight: 700;
            color: #14377C;
            line-height: 1.1;
            margin: 0 0 2px 0;
        }

        .headerSubtitle {
            font-size: 10.5pt;
            color: #555;
            margin: 0;
        }

        /* #endregion */

        /* #region 🧱 BODY */

        .section {
            margin-bottom: 16px;
            page-break-inside: avoid;
        }

        h2 {
            font-size: 12pt;
            color: #14377C;
            border-bottom: 1px solid #ccc;
            margin: 0 0 6px 0;
            padding-bottom: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 6px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f5f5f5;
            width: 32%;
            font-weight: 600;
        }

        .highlight {
            background: #f0f7ff;
            border-left: 4px solid #14377C;
            padding: 12px 14px;
            margin: 10px 0;
        }

        .map-container {
            text-align: center;
            margin: 12px 0;
            padding: 10px;
            border: 1px solid #ddd;
            background: #fafafa;
        }

        /* #endregion */

        /* #region 🧾 FOOTER */

        footer {
            border-top: 1px solid #ccc;
            margin-top: 20px;
            padding-top: 8px;
            font-size: 9pt;
            color: #666;
        }

        /* #endregion */
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <table class="headerTable">
            <tr>
                <td class="headerLogoCell">
                    <img src="https://skyelighting.com/skyesoft/assets/images/christyLogo.png"
                         class="headerLogo" alt="Christy Signs">
                </td>
                <td class="headerTitleCell">
                    <div class="headerTitle">{{reportTitle}}</div>
                    <div class="headerSubtitle">Skyesoft Operational Intelligence</div>
                </td>
            </tr>
        </table>
    </header>

    <!-- BODY -->
    <main>
        {{documentBody}}
    </main>

    <!-- FOOTER -->
    <footer>
        <table style="width:100%; border:none;">
            <tr>
                <td style="text-align:left; border:none;">
                    Christy Signs • 3145 N 33rd Ave, Phoenix, AZ 85017
                </td>
                <td style="text-align:right; border:none;">
                    Generated {{generatedDate}}
                </td>
            </tr>
        </table>
    </footer>

</body>
</html>
