<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{reportTitle}}</title>
  <style>
    @page {
      size: letter portrait;
      margin: 0.6in 0.5in 0.6in 0.5in;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: 11pt;
      color: #222;
      margin: 0;
      padding: 0;
      line-height: 1.35;
    }

    /* ========== CLEAN 2-COLUMN HEADER ========== */
    header {
      display: flex;
      align-items: flex-start;           /* Changed from center for better alignment */
      justify-content: flex-start;       /* Changed from space-between */
      gap: 20px;                         /* Adds nice space between logo and title */
      border-bottom: 2.5px solid #14377C;
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .header-left {
      flex-shrink: 0;
    }

    .header-left .logo {
      height: 52px;
    }

    .header-right {
      text-align: left;                  /* ← This is the key change */
      padding-top: 4px;
    }

    .header-right h1 {
      font-size: 15pt;
      color: #14377C;
      margin: 0 0 2px 0;
      font-weight: 700;
    }

    .header-right .subtitle {
      font-size: 10.5pt;
      color: #555;
    }

    /* ========== FOOTER ========== */
    footer {
      border-top: 2px solid #333;
      font-size: 9pt;
      text-align: center;
      padding-top: 6px;
      margin-top: 20px;
      color: #555;
    }

    /* ========== BODY ========== */
    main {
      margin-top: 10px;
    }

    .section {
      margin-bottom: 14px;
    }

    h2 {
      font-size: 12pt;
      color: #14377C;
      border-bottom: 1px solid #ccc;
      margin: 0 0 6px 0;
      padding-bottom: 3px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 6px 0;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: left;
    }

    th {
      background: #f5f5f5;
      width: 32%;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- CLEAN 2-COLUMN HEADER -->
  <header>
    <div class="header-left">
      <img src="https://skyelighting.com/skyesoft/assets/images/christyLogo.png" 
          class="logo" alt="Christy Signs">
    </div>
    
    <div class="header-right">
      <h1>Proposed Contact Report (PC-1)</h1>
      <div class="subtitle">Skyesoft Operational Intelligence</div>
    </div>
  </header>

  <!-- FOOTER -->
  <footer>
    <div>{{entityName}} • Confidential • Operational Document</div>
    <div>Generated: {{generatedDate}} &nbsp; • &nbsp; Page <span class="pageNumber"></span> of <span class="totalPages"></span></div>
  </footer>

  <!-- REPORT CONTENT -->
  <main>
    {{documentBody}}
  </main>

</body>
</html>
