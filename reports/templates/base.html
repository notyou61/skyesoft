<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{reportTitle}}</title>
    <style>
        @page {
            size: letter portrait;
            margin: 0.5in;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 11pt;
            color: #222;
            line-height: 1.4;
        }

        h2 {
            font-size: 13pt;
            color: #14377C;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 6px 8px;
            text-align: left;
        }

        th {
            background: #f5f5f5;
        }
    </style>
</head>
<body>

    <h1>{{reportTitle}}</h1>

    <main>
        {{documentBody}}
    </main>

</body>
</html>
