<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>{{reportTitle}}</title>

  <style>

    /* =====================================================
       PAGE CONSTITUTION
    ===================================================== */

    @page {
      size: letter portrait;
      margin: 0.6in 0.5in 0.6in 0.5in;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: 11pt;
      color: #222;
      margin: 0;
      padding: 0;
      line-height: 1.4;
    }

    /* =====================================================
       UNIVERSAL OPERATIONAL HEADER
    ===================================================== */

    header {
      position: fixed;

      top: 0;
      left: 0;
      right: 0;

      height: 0.95in;

      display: flex;
      align-items: center;
      gap: 16px;

      border-bottom: 2.5px solid #14377C;

      padding: 0 0.5in 8px 0.5in;

      background: #ffffff;

      z-index: 1000;
    }

    .header-left {
      flex-shrink: 0;
    }

    .header-left .logo {
      height: 58px;
    }

    .header-right {
      text-align: left;
    }

    .header-right h1 {
      font-size: 15pt;
      color: #14377C;

      margin: 0 0 2px 0;

      font-weight: 700;

      line-height: 1.1;
    }

    .header-right .subtitle {
      font-size: 10.5pt;
      color: #555;

      margin-top: 1px;
    }

    /* =====================================================
       UNIVERSAL OPERATIONAL FOOTER
    ===================================================== */

    footer {
      position: fixed;

      bottom: 0;
      left: 0;
      right: 0;

      height: 0.45in;

      border-top: 1px solid #ccc;

      font-size: 8.5pt;
      color: #666;

      padding: 6px 0.5in 0 0.5in;

      display: flex;
      justify-content: space-between;
      align-items: center;

      background: #ffffff;
    }

    /* =====================================================
       BODY CONTENT AREA
    ===================================================== */

    main {
      margin-top: 1.15in;
      margin-bottom: 0.65in;
    }

    .section {
      margin-bottom: 18px;

      page-break-inside: avoid;
    }

    p {
      margin: 6px 0;
    }

    /* =====================================================
       SECTION HEADERS
    ===================================================== */

    h2 {
      font-size: 12pt;
      color: #14377C;

      border-bottom: 1px solid #ccc;

      margin: 0 0 8px 0;
      padding-bottom: 3px;
    }

    /* =====================================================
       TABLES
    ===================================================== */

    table {
      width: 100%;

      border-collapse: collapse;

      margin: 8px 0;
    }

    th,
    td {
      border: 1px solid #ccc;

      padding: 6px 8px;

      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f5f5f5;

      width: 32%;

      font-weight: 600;
    }

    /* =====================================================
       UNIVERSAL OPERATIONAL PANELS
    ===================================================== */

    .highlight {
      background: #f0f7ff;

      padding: 12px 14px;

      border-left: 4px solid #14377C;

      margin: 12px 0;
    }

    .warning {
      background: #fff8e6;

      padding: 12px 14px;

      border-left: 4px solid #d48a00;

      margin: 12px 0;
    }

    .critical {
      background: #fff0f0;

      padding: 12px 14px;

      border-left: 4px solid #b00020;

      margin: 12px 0;
    }

    /* =====================================================
       MAP CONTAINER
    ===================================================== */

    .map-container {
      text-align: center;

      margin: 15px 0;

      padding: 10px;

      border: 1px solid #ddd;

      background: #fafafa;
    }

  </style>
</head>

<body>

  <!-- =====================================================
       UNIVERSAL OPERATIONAL HEADER
  ====================================================== -->

  <header>

    <div class="header-left">

      <img
        src="https://skyelighting.com/skyesoft/assets/images/christyLogo.png"
        class="logo"
        alt="Christy Signs">

    </div>

    <div class="header-right">

      <h1>{{reportTitle}}</h1>

      <div class="subtitle">
        Skyesoft Operational Intelligence
      </div>

    </div>

  </header>

  <!-- =====================================================
       UNIVERSAL OPERATIONAL FOOTER
  ====================================================== -->

  <footer>

    <div>
      Christy Signs • 3145 N 33rd Ave, Phoenix, AZ 85017
    </div>

    <div>
      Generated {{generatedDate}}
    </div>

  </footer>

  <!-- =====================================================
       REPORT CONTENT
  ====================================================== -->

  <main>

    {{documentBody}}

  </main>

</body>

</html>
