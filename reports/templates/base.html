<!--
  🧠 Skyesoft — base.html
  📄 Universal Operational PDF Constitution
  🧩 Reusable Report Shell (Header → Body → Footer)
  📍 Christy Signs | Phoenix, Arizona
-->

<!-- #region 🏷️ HTML TAG -->
<!DOCTYPE html>
<html lang="en">
<!-- #endregion -->

<!-- #region 🧠 HEAD -->
<head>

    <!-- #region 🧾 META & TITLE -->
    <meta charset="UTF-8">
    <title>{{reportTitle}}</title>
    <!-- #endregion -->

    <!-- #region 🎨 UNIVERSAL PDF STYLES -->
    <style>

        /* #region 📄 PAGE CONSTITUTION */

        @page {
            size: letter portrait;
            margin: 0.6in 0.5in 0.6in 0.5in;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 11pt;
            color: #222;

            margin: 0;
            padding: 0;

            line-height: 1.4;
        }

        /* #endregion */

        /* #region 🏢 UNIVERSAL OPERATIONAL HEADER */

        header {
            position: fixed;

            top: 0;
            left: 0;
            right: 0;

            height: 0.95in;

            border-bottom: 2.5px solid #14377C;

            padding: 0 0.5in 8px 0.5in;

            background: #ffffff;

            z-index: 1000;
        }

        .headerTable {
            width: 100%;

            border-collapse: collapse;
            border: none;
        }

        .headerTable td {
            border: none;

            vertical-align: middle;

            padding: 0;
        }

        .headerLogoCell {
            width: 1%;

            white-space: nowrap;

            text-align: left;

            vertical-align: middle;

            padding-right: 14px;
        }
        
        .headerTitleCell {
            width: auto;

            text-align: left;

            vertical-align: middle;
        }

        .headerLogo {
            height: 58px;
        }

        .headerTitle {
            font-size: 15pt;
            font-weight: 700;
            color: #14377C;

            line-height: 1.1;

            margin-bottom: 2px;
        }

        .headerSubtitle {
            font-size: 10.5pt;
            color: #555;
        }

        /* #endregion */

        /* #region 🧾 UNIVERSAL OPERATIONAL FOOTER */

        footer {
            position: fixed;

            bottom: 0;
            left: 0;
            right: 0;

            height: 0.45in;

            border-top: 1px solid #ccc;

            font-size: 8.5pt;
            color: #666;

            padding: 6px 0.5in 0 0.5in;

            background: #ffffff;
        }

        .footerTable {
            width: 100%;

            border-collapse: collapse;
            border: none;
        }

        .footerTable td {
            border: none;

            padding: 0;

            vertical-align: middle;
        }

        .footerLeft {
            text-align: left;
        }

        .footerRight {
            text-align: right;
        }

        /* #endregion */

        /* #region 🧱 BODY CONTENT AREA */

        main {
            margin-top: 1.15in;
            margin-bottom: 0.65in;
        }

        .section {
            margin-bottom: 18px;

            page-break-inside: avoid;
        }

        p {
            margin: 6px 0;
        }

        /* #endregion */

        /* #region 🏷️ SECTION HEADERS */

        h2 {
            font-size: 12pt;
            color: #14377C;

            border-bottom: 1px solid #ccc;

            margin: 0 0 8px 0;
            padding-bottom: 3px;
        }

        /* #endregion */

        /* #region 📊 TABLES */

        table {
            width: 100%;

            border-collapse: collapse;

            margin: 8px 0;
        }

        th,
        td {
            border: 1px solid #ccc;

            padding: 6px 8px;

            text-align: left;
            vertical-align: top;
        }

        th {
            width: 32%;

            background: #f5f5f5;

            font-weight: 600;
        }

        /* #endregion */

        /* #region 🚨 UNIVERSAL OPERATIONAL PANELS */

        .highlight {
            background: #f0f7ff;

            border-left: 4px solid #14377C;

            padding: 12px 14px;

            margin: 12px 0;
        }

        .warning {
            background: #fff8e6;

            border-left: 4px solid #d48a00;

            padding: 12px 14px;

            margin: 12px 0;
        }

        .critical {
            background: #fff0f0;

            border-left: 4px solid #b00020;

            padding: 12px 14px;

            margin: 12px 0;
        }

        /* #endregion */

        /* #region 🗺️ MAP CONTAINER */

        .map-container {
            text-align: center;

            margin: 15px 0;

            padding: 10px;

            border: 1px solid #ddd;

            background: #fafafa;
        }

        /* #endregion */

    </style>
    <!-- #endregion -->

</head>
<!-- #endregion -->

<!-- #region 🧍 BODY TAG -->
<body>
<!-- #endregion -->

<!-- #region 🏢 UNIVERSAL OPERATIONAL HEADER -->
<header>

    <!-- #region 🏷️ HEADER TABLE -->
    <table class="headerTable">

        <tr>

            <!-- #region 🖼️ HEADER LOGO -->
            <td class="headerLogoCell">

                <img
                    src="https://skyelighting.com/skyesoft/assets/images/christyLogo.png"
                    class="headerLogo"
                    alt="Christy Signs">

            </td>
            <!-- #endregion -->

            <!-- #region 🧾 HEADER TITLE BLOCK -->
            <td class="headerTitleCell">

                <div class="headerTitle">
                    {{reportTitle}}
                </div>

                <div class="headerSubtitle">
                    Skyesoft Operational Intelligence
                </div>

            </td>
            <!-- #endregion -->

        </tr>

    </table>
    <!-- #endregion -->

</header>
<!-- #endregion -->

<!-- #region 🧾 UNIVERSAL OPERATIONAL FOOTER -->
<footer>

    <!-- #region 📊 FOOTER TABLE -->
    <table class="footerTable">

        <tr>

            <!-- #region 📍 FOOTER LEFT -->
            <td class="footerLeft">
                Christy Signs • 3145 N 33rd Ave, Phoenix, AZ 85017
            </td>
            <!-- #endregion -->

            <!-- #region ⏰ FOOTER RIGHT -->
            <td class="footerRight">
                Generated {{generatedDate}}
            </td>
            <!-- #endregion -->

        </tr>

    </table>
    <!-- #endregion -->

</footer>
<!-- #endregion -->

<!-- #region 🧱 REPORT CONTENT -->
<main>

    {{documentBody}}

</main>
<!-- #endregion -->

<!-- #region 🛑 ENDING BODY HTML TAG -->
</body>
</html>
<!-- #endregion -->
